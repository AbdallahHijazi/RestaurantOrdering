<main class="placeholder" [attr.dir]="locale.direction()">
  <p class="placeholder__eyebrow">{{ locale.uiText('adminPlaceholderEyebrow') }}</p>
  <h1>{{ locale.uiText('adminPlaceholderTitle') }}</h1>
  <p>{{ locale.uiText('adminPlaceholderDescription') }}</p>
  <p class="placeholder__meta">
    {{ locale.uiText('adminPlaceholderRoleLabel') }}:
    <strong>{{ auth.currentRole() }}</strong>
  </p>
  <button type="button" class="placeholder__logout" (click)="logout()">
    {{ locale.uiText('adminPlaceholderLogout') }}
  </button>
</main>
