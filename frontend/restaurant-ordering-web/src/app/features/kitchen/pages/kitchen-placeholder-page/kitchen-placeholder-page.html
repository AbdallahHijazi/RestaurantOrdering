<main class="placeholder" [attr.dir]="locale.direction()">
  <p class="placeholder__eyebrow">{{ locale.uiText('kitchenPlaceholderEyebrow') }}</p>
  <h1>{{ locale.uiText('kitchenPlaceholderTitle') }}</h1>
  <p>{{ locale.uiText('kitchenPlaceholderDescription') }}</p>
  <p class="placeholder__meta">
    {{ locale.uiText('kitchenPlaceholderRoleLabel') }}:
    <strong>{{ auth.currentRole() }}</strong>
  </p>
  <button type="button" class="placeholder__logout" (click)="logout()">
    {{ locale.uiText('kitchenPlaceholderLogout') }}
  </button>
</main>
